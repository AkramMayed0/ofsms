# ============================================================
# OFSMS Nginx Configuration
# File: /etc/nginx/sites-available/ofsms
#
# Architecture:
#   Internet → Nginx (443 HTTPS) → Express (localhost:4000)
#   Internet → Nginx (80 HTTP)   → 301 redirect to HTTPS
#
# TLS: Let's Encrypt via Certbot (run after placing this file)
#   certbot --nginx -d yourdomain.com
#
# To enable:
#   sudo ln -s /etc/nginx/sites-available/ofsms /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ── Rate limiting zone ────────────────────────────────────────────────────────
# Limits each IP to 30 requests/second to the API
# Burst of 60 allows short spikes without dropping legitimate requests
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS certificates (managed by Certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── TLS protocol & cipher hardening ──────────────────────────────────────
    # Only TLS 1.2 and 1.3 (SADD §5 requirement)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suite — forward secrecy, no RC4/DES/3DES/MD5
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;  # Let client pick from our list (TLS 1.3 best practice)

    # Session resumption (performance + security balance)
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # Disable — forward secrecy

    # OCSP stapling — faster cert validation for clients
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Diffie-Hellman parameters (generate with: openssl dhparam -out /etc/nginx/dhparam.pem 2048)
    ssl_dhparam /etc/nginx/dhparam.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    # HSTS — 1 year, all subdomains, preload eligible (SADD §5)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

    # ── Backend API proxy (/api/* → Express on port 4000) ────────────────────
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;

        # Proxy to Express
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # Required for WebSocket / keep-alive
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Pass real client info to Express (enables req.ip, req.secure)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;

        # Don't cache API responses
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Health check (no rate limiting) ──────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:4000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Frontend (Next.js on port 3000) ──────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/ofsms_access.log;
    error_log  /var/log/nginx/ofsms_error.log warn;
}
